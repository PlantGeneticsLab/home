---
layout: page
title: "Team Album"
description: "Plant Genetics Lab"
header-img: "img/group.jpg"
---

<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #fff; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; }

  /* ===== 导航容器：全屏宽度，固定高度 ===== */
  .nav-outer {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(15px);
    width: 100%;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: ew-resize;
    /* 渐隐遮罩：更宽的中间透明区 */
    -webkit-mask-image: linear-gradient(to right, transparent, black 30%, black 70%, transparent);
    mask-image: linear-gradient(to right, transparent, black 30%, black 70%, transparent);
  }

  /* 滚动轨道：我们将通过 JS 动态计算 left 值 */
  .year-wrapper {
    display: flex;
    align-items: center;
    position: absolute;
    left: 50%;
    will-change: transform;
    /* transition 设置短一点，保证跟手感，点击时会临时变长 */
    transition: transform 0.2s ease-out; 
    gap: 80px; /* 间距拉开，更有高级感 */
  }

  .year {
    font-size: 22px;
    color: #ccc;
    cursor: pointer;
    transition: all 0.4s ease;
    white-space: nowrap;
    user-select: none;
    font-weight: 300;
  }

  .year.active {
    color: #000;
    font-weight: 800;
    font-size: 56px;
    transform: scale(1.1);
  }

  .year:hover:not(.active) {
    color: #888;
    transform: scale(1.1);
  }

  /* ===== 瀑布流布局 ===== */
  .gallery {
    column-count: 3;
    column-gap: 20px;
    padding: 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .gallery-item {
    break-inside: avoid;
    margin-bottom: 20px;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.3s;
  }

  .gallery-item img { width: 100%; display: block; cursor: zoom-in; }

  @media (max-width: 900px) { .gallery { column-count: 2; } }
  @media (max-width: 600px) { .gallery { column-count: 1; } }

  #lightbox {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.9); display: none;
    justify-content: center; align-items: center; z-index: 2000;
  }
  #lightbox img { max-width: 90%; max-height: 90%; }
</style>
</head>

<body>

<div class="nav-outer" id="navOuter">
  <div class="year-wrapper" id="yearWrapper">
    <!-- JS 生成年份 -->
  </div>
</div>

<div class="gallery" id="gallery"></div>
<div id="lightbox" onclick="this.style.display='none'"><img id="lbImg"></div>

<script>
// ... 之前的 HTML 和 CSS 保持不变，只需替换 <script> 部分 ...

const years = ["2017","2018","2019","2020","2021","2022","2023","2024","2025","2026"];
const wrapper = document.getElementById("yearWrapper");
const outer = document.getElementById("navOuter");
let activeYear = "2026";

// 状态变量
let targetX = 0;   // 目标位移
let currentX = 0;  // 当前实际位移
let rafId = null;  // 动画帧 ID

function init() {
  years.forEach(y => {
    const div = document.createElement('div');
    div.className = `year ${y === activeYear ? 'active' : ''}`;
    div.innerText = y;
    div.onclick = () => selectYear(y, div);
    wrapper.appendChild(div);
  });
  
  setTimeout(() => {
    const el = Array.from(wrapper.children).find(e => e.innerText === activeYear);
    snapToYear(el);
    loadImages(activeYear);
  }, 100);
}

// 强制对齐某个年份（用于初始化和点击）
function snapToYear(el) {
  if (!el) return;
  const elCenter = el.offsetLeft + el.offsetWidth / 2;
  // 停止当前的跟随动画，直接跳转
  cancelAnimationFrame(rafId);
  targetX = -elCenter;
  currentX = -elCenter;
  wrapper.style.transition = "transform 0.6s cubic-bezier(0.19, 1, 0.22, 1)";
  wrapper.style.transform = `translateX(${targetX}px)`;
}

// 核心：平滑跟随逻辑
function update() {
  // 线性插值公式：当前位置 = 当前位置 + (目标 - 当前) * 灵敏度系数
  // 0.05 代表灵敏度，数值越小越迟钝（越丝滑），数值越大越跟手
  currentX += (targetX - currentX) * 0.08; 
  
  wrapper.style.transform = `translateX(${currentX}px)`;
  
  if (Math.abs(targetX - currentX) > 0.1) {
    rafId = requestAnimationFrame(update);
  }
}

outer.addEventListener('mousemove', (e) => {
  const rect = outer.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const pct = mouseX / rect.width;
  
  const totalWidth = wrapper.offsetWidth;
  
  // 这里的 targetX 计算稍微往中心靠拢一点，防止边缘滑过头
  // 我们让 targetX 在 -totalWidth 和 0 之间线性映射
  targetX = -(pct * totalWidth);

  // 移除 CSS transition，改用 requestAnimationFrame 手动平滑处理
  wrapper.style.transition = "none";
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(update);
});

outer.addEventListener('mouseleave', () => {
  const activeEl = document.querySelector('.year.active');
  if (activeEl) {
    const elCenter = activeEl.offsetLeft + activeEl.offsetWidth / 2;
    targetX = -elCenter;
    // 离开时给一个顺滑的回归动画
    wrapper.style.transition = "transform 0.8s cubic-bezier(0.19, 1, 0.22, 1)";
    wrapper.style.transform = `translateX(${targetX}px)`;
    cancelAnimationFrame(rafId);
  }
});

function selectYear(year, el) {
  activeYear = year;
  document.querySelectorAll('.year').forEach(y => y.classList.remove('active'));
  el.classList.add('active');
  
  // 点击后强制居中
  snapToYear(el);
  loadImages(year);
}

// 图片加载逻辑保持不变...
async function loadImages(year) {
  const gal = document.getElementById('gallery');
  gal.innerHTML = "Loading...";
  try {
    const res = await fetch(`./${year}/list.json`);
    const data = await res.json();
    gal.innerHTML = "";
    data.forEach(src => {
      const item = document.createElement('div');
      item.className = "gallery-item";
      const img = document.createElement('img');
      img.src = `./${year}/${src}`;
      img.onclick = () => {
        document.getElementById('lbImg').src = img.src;
        document.getElementById('lightbox').style.display = 'flex';
      };
      item.appendChild(img);
      gal.appendChild(item);
    });
  } catch(e) { gal.innerHTML = "No images"; }
}

init();
</script>
</body>
